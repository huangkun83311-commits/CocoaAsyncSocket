name: Build CocoaAsyncSocket Jailbreak Deb

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-deb:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare Build Environment
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          brew install dpkg

      # ✅ 修正路径：加上 GCD/ 目录
      - name: Build arm64 Static Library (manual compile)
        run: |
          SDK_IPHONEOS=$(xcrun --sdk iphoneos --show-sdk-path)
          mkdir -p build/Release-iphoneos
          # 修正：加上 GCD/ 目录
          xcrun clang -arch arm64 -isysroot $SDK_IPHONEOS \
            -fobjc-arc \
            -c $GITHUB_WORKSPACE/Source/GCD/GCDAsyncSocket.m $GITHUB_WORKSPACE/Source/GCD/GCDAsyncUdpSocket.m \
            -o build/Release-iphoneos/CocoaAsyncSocket.o
          xcrun ar rcs build/Release-iphoneos/libCocoaAsyncSocket.a build/Release-iphoneos/CocoaAsyncSocket.o

      # ✅ 修正路径：加上 GCD/ 目录
      - name: Setup Deb Package Structure
        run: |
          DEB_ROOT=build/CocoaAsyncSocket-deb
          mkdir -p $DEB_ROOT/DEBIAN
          mkdir -p $DEB_ROOT/Library/Frameworks
          # 复制静态库
          cp build/Release-iphoneos/libCocoaAsyncSocket.a $DEB_ROOT/Library/Frameworks/
          # 修正：头文件在 Source/GCD/ 目录下
          cp $GITHUB_WORKSPACE/Source/GCD/GCDAsyncSocket.h $DEB_ROOT/Library/Frameworks/
          cp $GITHUB_WORKSPACE/Source/GCD/GCDAsyncUdpSocket.h $DEB_ROOT/Library/Frameworks/
          # deb 控制文件
          cat > $DEB_ROOT/DEBIAN/control << EOF
          Package: com.cocoasyncsocket.jailbreak
          Name: CocoaAsyncSocket
          Version: 7.6.5
          Architecture: iphoneos-arm
          Depends: mobilesubstrate (>= 0.9.5900)
          Maintainer: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
          Description: CocoaAsyncSocket for iOS Jailbreak (arm64)
          Section: Tweaks
          Author: robbiehanson
          Homepage: https://github.com/robbiehanson/CocoaAsyncSocket
          EOF
          # 权限设置
          chmod 0755 $DEB_ROOT/DEBIAN
          chmod 0644 $DEB_ROOT/DEBIAN/control

      - name: Build Deb Package
        run: |
          dpkg-deb --build build/CocoaAsyncSocket-deb/ build/CocoaAsyncSocket-jailbreak_7.6.5_arm64.deb
          dpkg-deb -I build/CocoaAsyncSocket-jailbreak_7.6.5_arm64.deb

      - name: Upload Deb Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CocoaAsyncSocket-Jailbreak-Deb
          path: build/CocoaAsyncSocket-jailbreak_7.6.5_arm64.deb
