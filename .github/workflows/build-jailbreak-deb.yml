name: Build CocoaAsyncSocket Jailbreak Deb

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-deb:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 修复Xcode路径 + 安装deb打包工具dpkg
      - name: Prepare Environment
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          brew install dpkg # 安装deb打包工具

      # 编译越狱设备用的静态库（仅arm64）
      - name: Build iOS Static Lib (arm64)
        run: |
          xcodebuild -project CocoaAsyncSocket.xcodeproj \
            -target CocoaAsyncSocket \
            -configuration Release \
            -sdk iphoneos \
            ARCHS="arm64" \
            ONLY_ACTIVE_ARCH=NO \
            BUILD_DIR=build \
            clean build

      # 搭建deb包目录结构（符合iOS越狱规范）
      - name: Prepare Deb Structure
        run: |
          DEB_ROOT=build/CocoaAsyncSocket-deb
          mkdir -p $DEB_ROOT/DEBIAN
          mkdir -p $DEB_ROOT/Library/Frameworks

          # 复制静态库和头文件
          cp build/Release-iphoneos/libCocoaAsyncSocket.a $DEB_ROOT/Library/Frameworks/
          cp Source/*.h $DEB_ROOT/Library/Frameworks/

          # 编写deb控制文件（必须）
          cat > $DEB_ROOT/DEBIAN/control << EOF
          Package: com.cocoasyncsocket.jailbreak
          Name: CocoaAsyncSocket
          Version: 7.6.5
          Architecture: iphoneos-arm
          Depends: mobilesubstrate (>= 0.9.5900)
          Maintainer: ${{ github.actor }} <${{ github.actor }}@users.noreply.github.com>
          Description: CocoaAsyncSocket for iOS Jailbreak (arm64)
          Section: Tweaks
          Author: robbiehanson
          Homepage: https://github.com/robbiehanson/CocoaAsyncSocket
          EOF

          # 设置权限（deb包要求）
          chmod 0755 $DEB_ROOT/DEBIAN
          chmod 0644 $DEB_ROOT/DEBIAN/control

      # 打包成deb文件
      - name: Build Deb Package
        run: |
          dpkg-deb --build build/CocoaAsyncSocket-deb/ build/CocoaAsyncSocket-jailbreak_7.6.5_arm64.deb
          dpkg-deb -I build/CocoaAsyncSocket-jailbreak_7.6.5_arm64.deb # 验证deb包

      # 上传deb包供下载
      - name: Upload Jailbreak Deb
        uses: actions/upload-artifact@v4
        with:
          name: CocoaAsyncSocket-Jailbreak-Deb
          path: build/CocoaAsyncSocket-jailbreak_7.6.5_arm64.deb
